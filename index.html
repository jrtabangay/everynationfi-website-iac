<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Every Nation Finland | Under Maintenance</title>
    <style>
        :root {
            color-scheme: light;
            --ink: #172033;
            --muted: #5d6678;
            --accent: #d65a31;
            --paper: #f8f6f1;
            --panel: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Arial, Helvetica, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(214, 90, 49, 0.12), transparent 32rem),
                linear-gradient(135deg, #f8f6f1 0%, #eef4f8 100%);
            color: var(--ink);
        }

        main {
            width: min(100%, 640px);
            padding: clamp(32px, 7vw, 56px);
            border: 1px solid rgba(23, 32, 51, 0.08);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.86);
            box-shadow: 0 24px 70px rgba(23, 32, 51, 0.12);
            text-align: center;
        }

        .eyebrow {
            margin: 0 0 16px;
            color: var(--accent);
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 7vw, 4rem);
            line-height: 1;
            letter-spacing: 0;
        }

        p {
            margin: 20px auto 0;
            max-width: 30rem;
            color: var(--muted);
            font-size: 1.05rem;
            line-height: 1.7;
        }

        a {
            color: var(--accent);
            font-weight: 700;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <main>
        <p class="eyebrow">Every Nation Finland</p>
        <h1>Website Under Maintenance</h1>
        <p>We are making a few updates and will be back online soon.</p>
        <p>For urgent inquiries, email <a href="mailto:info@everynation.fi">info@everynation.fi</a>.</p>
    </main>
</body>
</html>
